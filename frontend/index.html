      <h1>AuthOnce — Non-Custodial USDC Subscription Payments on Base Network</h1>
      <p>AuthOnce is a non-custodial crypto subscription protocol built on Base Network. Merchants accept gasless USDC recurring payments using EIP-2612 permit-based authorization. Subscribers authorize once — funds are pulled automatically every billing cycle, straight to the merchant's wallet. No custody. No chargebacks. 0.5% flat protocol fee.</p>
      <h2>Non-Custodial On-Chain Subscription Billing</h2>
      <p>Unlike custodial crypto payment processors, AuthOnce never holds funds. Every payment is a single atomic transaction from subscriber wallet to merchant wallet.</p>
      <h2>Gasless USDC Subscriptions on Base</h2>
      <p>Subscribers sign a single EIP-2612 permit off-chain — no gas, no on-chain approval transaction. The AuthOnce keeper executes recurring pulls on each billing date.</p>
      <h2>Programmable Grace Period and Dunning</h2>
      <p>Configurable 1–30 day grace period built into the smart contract. Failed payments trigger automatic retries before a subscription expires.</p>
      <p>Mainnet launch Q3 2026. <a href="https://authonce.io/#contact">Apply as a founding merchant</a>. Read our <a href="https://blog.authonce.io">founder's blog</a>.</p>
